<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>day-check | 메인 화면</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="topbar card">
        <div>
          <p class="eyebrow">DAY-CHECK</p>
          <h1>투두 한창</h1>
          <p id="todayDate" class="muted"></p>
        </div>
        <button class="naver-btn" type="button">네이버 로그인</button>
      </header>

      <section class="todo-panel card" aria-label="투두 작성">
        <div class="panel-head">
          <h2>내가 할 일 쭉쭉 입력</h2>
          <p class="muted">여러 줄 입력 가능 (줄바꿈마다 할 일 1개)</p>
        </div>

        <form id="todoComposer" class="todo-composer">
          <textarea
            id="todoTextarea"
            rows="5"
            maxlength="2000"
            placeholder="예)\n클라이언트A 기획안 검토\n팀 미팅 아젠다 정리\n세금 자료 업로드"
            required
          ></textarea>

          <div class="composer-row">
            <input id="composerDate" type="date" aria-label="할 일 날짜" />
            <select id="composerPriority" aria-label="우선순위">
              <option value="3">높음</option>
              <option value="2" selected>보통</option>
              <option value="1">낮음</option>
            </select>
            <select id="composerCategory" aria-label="분류"></select>
            <button id="openCategoryInlineBtn" type="button">+ 분류 추가</button>
            <button type="submit">할 일 저장</button>
          </div>

          <div id="inlineCategoryCreate" class="inline-category-create hidden" aria-label="분류 추가">
            <input
              id="newCategoryInput"
              type="text"
              maxlength="40"
              placeholder="새 분류명 입력 (예: 클라이언트A)"
            />
            <button id="createCategoryBtn" type="button">추가</button>
            <button id="cancelCategoryBtn" type="button">취소</button>
          </div>
        </form>
      </section>

      <section class="todo-list-panel card" aria-label="할 일 목록">
        <div class="panel-head">
          <h2>전체 투두</h2>
          <span id="todoCount" class="count">0</span>
        </div>
        <ul id="todoList" class="todo-list"></ul>
      </section>

      <section class="card calendar" aria-label="달력">
        <div class="calendar-head">
          <h2>달력 v3</h2>
          <div class="calendar-nav">
            <button id="prevMonthBtn" type="button">이전 달</button>
            <p id="calendarMonthLabel" class="muted"></p>
            <button id="nextMonthBtn" type="button">다음 달</button>
          </div>
        </div>

        <form id="calendarForm" class="calendar-form">
          <input id="calendarDateInput" type="date" required aria-label="달력 날짜" />
          <select id="calendarTypeSelect" aria-label="달력 항목 유형">
            <option value="note">별도 메모</option>
            <option value="todo">체크리스트</option>
          </select>
          <input id="calendarTextInput" type="text" maxlength="140" placeholder="달력에 표시할 내용" required />
          <button type="submit">달력에 추가</button>
        </form>

        <div class="calendar-weekdays" aria-hidden="true">
          <span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span><span>일</span>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>

        <aside class="calendar-detail card" aria-label="선택한 날짜 상세">
          <div class="calendar-detail-head">
            <h3 id="selectedDateLabel">선택한 날짜</h3>
            <p id="selectedDateSummary" class="muted"></p>
          </div>
          <div class="calendar-detail-grid">
            <article>
              <h4>해당 날짜에 추가된 체크리스트</h4>
              <ul id="selectedCreatedList" class="report-list"></ul>
            </article>
            <article>
              <h4>해당 날짜에 완료된 체크리스트</h4>
              <ul id="selectedCompletedList" class="report-list"></ul>
            </article>
            <article>
              <h4>해당 날짜의 달력 메모/별도 내용</h4>
              <ul id="selectedCalendarNoteList" class="report-list"></ul>
            </article>
          </div>
        </aside>
      </section>

      <section class="card report" aria-label="주간 리포트">
        <div class="report-head">
          <h2>이번 주 리포트</h2>
          <p id="weekRange" class="muted"></p>
        </div>
        <div class="report-grid">
          <article>
            <h3>이번 주 완료(지운 일)</h3>
            <p id="weeklyDoneCount" class="muted"></p>
            <ul id="weeklyDoneList" class="report-list"></ul>
          </article>
          <article>
            <h3>아직 남은 일</h3>
            <p id="weeklyPendingCount" class="muted"></p>
            <ul id="weeklyPendingList" class="report-list"></ul>
          </article>
        </div>
      </section>
    </main>

    <template id="todoItemTemplate">
      <li class="todo-item">
        <div class="todo-main">
          <span class="title"></span>
          <span class="meta"></span>
        </div>
        <div class="todo-controls">
          <select class="todo-category-select" aria-label="할 일 분류"></select>
          <button class="complete" type="button">완료</button>
          <button class="delete" type="button" aria-label="삭제">삭제</button>
        </div>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
