name: Deploy app to Ubuntu server

on:
  push:
    branches:
      - main
      - work
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print target revision
        run: |
          echo "[deploy] github sha: ${GITHUB_SHA}"
          echo "${GITHUB_SHA}" > .deploy-version

      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY || secrets.SSH_KEY || secrets['SSH-KEY'] }}
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_PRIVATE_KEY_B64 || secrets.SSH_KEY2 || secrets['SSH-KEY2'] }}
          SSH_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST || '168.107.48.248' }}
          SSH_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER || 'ubuntu' }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH || vars.SERVER_APP_PATH || '/home/ubuntu/day-check' }}
        run: |
          set -euo pipefail
          required_vars=("SSH_HOST" "SSH_USER" "APP_PATH")
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error title=Missing secret::${var_name} is required. Set SERVER_HOST, SERVER_USER, SERVER_APP_PATH."
              exit 1
            fi
          done

          if [ -z "${SSH_KEY:-}" ] && [ -z "${SSH_KEY_B64:-}" ]; then
            echo "::error title=Missing secret::Set one of SERVER_SSH_PRIVATE_KEY / SSH_KEY / SSH-KEY or SERVER_SSH_PRIVATE_KEY_B64 / SSH_KEY2 / SSH-KEY2."
            exit 1
          fi

          mkdir -p ~/.ssh
          umask 077

          if [ -n "${SSH_KEY:-}" ]; then
            KEY_CONTENT="$(printf '%s' "$SSH_KEY" | tr -d '\r')"
            if printf '%s' "$KEY_CONTENT" | grep -q '\\n'; then
              KEY_CONTENT="$(printf '%b' "$KEY_CONTENT")"
            fi
            printf '%s\n' "$KEY_CONTENT" > ~/.ssh/deploy_key
          else
            if ! printf '%s' "$SSH_KEY_B64" | tr -d '\r\n ' | base64 -d > ~/.ssh/deploy_key 2>/dev/null; then
              echo "::error title=Invalid secret::SERVER_SSH_PRIVATE_KEY_B64 is not valid base64."
              exit 1
            fi
          fi

          chmod 600 ~/.ssh/deploy_key

          if grep -q "PUBLIC KEY" ~/.ssh/deploy_key; then
            echo "::error title=Wrong key type::A public key was provided. Use a private key secret."
            exit 1
          fi

          if ! ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null 2>&1; then
            echo "::error title=Invalid private key::Could not parse SSH private key. Re-save exact key text or use SERVER_SSH_PRIVATE_KEY_B64."
            exit 1
          fi

          echo "[deploy] key fingerprint:"
          ssh-keygen -lf ~/.ssh/deploy_key || true

          PORT="${SSH_PORT:-22}"
          keyscan_ok=false
          for attempt in 1 2 3; do
            if ssh-keyscan -T 30 -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
              keyscan_ok=true
              break
            fi
            echo "[deploy] ssh-keyscan retry ${attempt}/3 failed"
            sleep 3
          done
          if [ "$keyscan_ok" != "true" ]; then
            echo "::error title=SSH host unreachable::ssh-keyscan failed for ${SSH_HOST}:${PORT}"
            exit 1
          fi
          chmod 600 ~/.ssh/known_hosts
          ssh_ok=false
          for attempt in 1 2 3; do
            if ssh -vv -i ~/.ssh/deploy_key -p "$PORT" \
              -o BatchMode=yes \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=yes \
              "${SSH_USER}@${SSH_HOST}" "echo '[deploy] ssh handshake ok'"; then
              ssh_ok=true
              break
            fi
            echo "[deploy] ssh handshake retry ${attempt}/3 failed"
            sleep 3
          done
          if [ "$ssh_ok" != "true" ]; then
            echo "::error title=SSH handshake failed::Unable to connect to ${SSH_HOST}:${PORT}"
            exit 1
          fi

      - name: Sync project files
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST || '168.107.48.248' }}
          SSH_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER || 'ubuntu' }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH || vars.SERVER_APP_PATH || '/home/ubuntu/day-check' }}
        run: |
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='server.log' \
            --exclude='security-events.log' \
            --exclude='tmp_registerevents.txt' \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=yes" \
            ./ "${SSH_USER}@${SSH_HOST}:${APP_PATH}/"

      - name: Install and restart on server
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST || '168.107.48.248' }}
          SSH_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER || 'ubuntu' }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH || vars.SERVER_APP_PATH || '/home/ubuntu/day-check' }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" "bash ${APP_PATH}/scripts/deploy-server.sh"

      - name: Verify deployed revision
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST || vars.SERVER_HOST || '168.107.48.248' }}
          SSH_USER: ${{ secrets.SERVER_USER || vars.SERVER_USER || 'ubuntu' }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH || vars.SERVER_APP_PATH || '/home/ubuntu/day-check' }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          DEPLOYED_REV="$(
            ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" \
              "if [ -d \"${APP_PATH}/.git\" ]; then git -C \"${APP_PATH}\" rev-parse HEAD; elif [ -f \"${APP_PATH}/.deploy-version\" ]; then cat \"${APP_PATH}/.deploy-version\"; else echo 'missing'; fi"
          )"
          echo "[deploy] remote revision: ${DEPLOYED_REV}"
          if [ "${DEPLOYED_REV}" != "${GITHUB_SHA}" ]; then
            echo "::error title=Revision mismatch::Expected ${GITHUB_SHA}, got ${DEPLOYED_REV}"
            exit 1
          fi
