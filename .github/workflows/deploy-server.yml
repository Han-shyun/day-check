name: Deploy app to Ubuntu server

on:
  push:
    branches:
      - main
      - work
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print target revision
        run: |
          echo "[deploy] github sha: ${GITHUB_SHA}"
          echo "${GITHUB_SHA}" > .deploy-version

      - name: Prepare SSH key
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
        run: |
          set -euo pipefail
          required_vars=("SSH_KEY" "SSH_HOST" "SSH_USER" "APP_PATH")
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "::error title=Missing secret::${var_name} is required. Set SERVER_SSH_PRIVATE_KEY, SERVER_HOST, SERVER_USER, SERVER_APP_PATH."
              exit 1
            fi
          done

          mkdir -p ~/.ssh
          umask 077
          printf '%s\n' "$SSH_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          PORT="${SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          ssh -vv -i ~/.ssh/deploy_key -p "$PORT" \
            -o BatchMode=yes \
            -o ConnectTimeout=8 \
            -o StrictHostKeyChecking=yes \
            "${SSH_USER}@${SSH_HOST}" "echo '[deploy] ssh handshake ok'"

      - name: Sync project files
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='server.log' \
            --exclude='security-events.log' \
            --exclude='tmp_registerevents.txt' \
            -e "ssh -i ~/.ssh/deploy_key -p ${PORT} -o StrictHostKeyChecking=yes" \
            ./ "${SSH_USER}@${SSH_HOST}:${APP_PATH}/"

      - name: Install and restart on server
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
        run: |
          PORT="${SSH_PORT:-22}"
          ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" "bash ${APP_PATH}/scripts/deploy-server.sh"

      - name: Verify deployed revision
        env:
          SSH_HOST: ${{ secrets.SERVER_HOST }}
          SSH_USER: ${{ secrets.SERVER_USER }}
          SSH_PORT: ${{ secrets.SERVER_SSH_PORT }}
          APP_PATH: ${{ secrets.SERVER_APP_PATH }}
        run: |
          set -euo pipefail
          PORT="${SSH_PORT:-22}"
          DEPLOYED_REV="$(
            ssh -i ~/.ssh/deploy_key -p "$PORT" -o StrictHostKeyChecking=yes "${SSH_USER}@${SSH_HOST}" \
              "if [ -d \"${APP_PATH}/.git\" ]; then git -C \"${APP_PATH}\" rev-parse HEAD; elif [ -f \"${APP_PATH}/.deploy-version\" ]; then cat \"${APP_PATH}/.deploy-version\"; else echo 'missing'; fi"
          )"
          echo "[deploy] remote revision: ${DEPLOYED_REV}"
          if [ "${DEPLOYED_REV}" != "${GITHUB_SHA}" ]; then
            echo "::error title=Revision mismatch::Expected ${GITHUB_SHA}, got ${DEPLOYED_REV}"
            exit 1
          fi
